<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: blue to indigo, top-left to bottom-right -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#5C3EC2"/>
    </linearGradient>

    <!-- Subtle inner shadow / vignette -->
    <radialGradient id="vignette" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </radialGradient>

    <!-- Icon square gradient: lighter translucent white -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.75"/>
    </linearGradient>

    <!-- Crosshair highlight glow -->
    <radialGradient id="crosshairGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD060" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD060" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for crosshair -->
    <filter id="crosshairShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background fill -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <!-- Subtle grid lines (faint, behind icons) -->
  <g stroke="white" stroke-opacity="0.08" stroke-width="1.5">
    <!-- Vertical grid lines -->
    <line x1="385" y1="131" x2="385" y2="893"/>
    <line x1="512" y1="131" x2="512" y2="893"/>
    <line x1="639" y1="131" x2="639" y2="893"/>
    <!-- Horizontal grid lines -->
    <line x1="131" y1="385" x2="893" y2="385"/>
    <line x1="131" y1="512" x2="893" y2="512"/>
    <line x1="131" y1="639" x2="893" y2="639"/>
  </g>

  <!--
    3x3 grid of icon squares — LARGER layout
    Grid area: 131–893 (762px wide), 3 columns of 254px each
    Each icon square: 150x150 with 28px corner radius
    Column centers: 258, 512, 766
  -->
  <g>
    <!-- Row 1 -->
    <rect x="183" y="183" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="0.85"/>
    <rect x="437" y="183" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="0.85"/>
    <rect x="691" y="183" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="0.85"/>

    <!-- Row 2 -->
    <rect x="183" y="437" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="0.85"/>
    <!-- Center icon: highlighted (crosshair target) -->
    <rect x="437" y="437" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="1.0"/>
    <rect x="691" y="437" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="0.85"/>

    <!-- Row 3 -->
    <rect x="183" y="691" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="0.85"/>
    <rect x="437" y="691" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="0.85"/>
    <rect x="691" y="691" width="150" height="150" rx="28" ry="28" fill="url(#iconGrad)" opacity="0.85"/>
  </g>

  <!-- Crosshair / reticle centered on the middle icon (512, 512) — ring reaches outer icon column -->
  <g filter="url(#crosshairShadow)">
    <!-- Glow behind crosshair -->
    <circle cx="512" cy="512" r="280" fill="url(#crosshairGlow)"/>

    <!-- Outer ring — radius 254 reaches center of outermost icon columns -->
    <circle cx="512" cy="512" r="254" fill="none" stroke="#FFCC00" stroke-width="36" opacity="1.0"/>

    <!-- Crosshair lines — extend past the outer ring (radius 254, so arms go to ~230 and ~794) -->
    <g stroke="#FFCC00" stroke-width="40" stroke-linecap="round" opacity="1.0">
      <!-- Top arm -->
      <line x1="512" y1="145" x2="512" y2="397"/>
      <!-- Bottom arm -->
      <line x1="512" y1="627" x2="512" y2="879"/>
      <!-- Left arm -->
      <line x1="145" y1="512" x2="397" y2="512"/>
      <!-- Right arm -->
      <line x1="627" y1="512" x2="879" y2="512"/>
    </g>

    <!-- Center dot -->
    <circle cx="512" cy="512" r="30" fill="#FFCC00" opacity="1.0"/>
  </g>

  <!-- Position indicator dots at top-right cell of inner 3x3 grid inside each icon square -->
  <!-- Each rect is 150x150; inner 3x3 grid cell = 50x50; top-right cell center = (rect_x+125, rect_y+25) -->
  <g fill="#7BF5A0" opacity="0.85">
    <!-- Row 1: top-left and top-center rects -->
    <circle cx="308" cy="208" r="10"/>
    <circle cx="562" cy="208" r="10"/>
    <!-- Row 2: left and right rects -->
    <circle cx="308" cy="462" r="10"/>
    <circle cx="816" cy="462" r="10"/>
    <!-- Row 3: bottom-left and bottom-right rects -->
    <circle cx="308" cy="716" r="10"/>
    <circle cx="816" cy="716" r="10"/>
  </g>
</svg>
